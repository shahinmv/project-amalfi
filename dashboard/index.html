<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Amalfi — Live Cell</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#080b11; color:#e6edf3;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:14px; padding:12px 20px; flex-wrap:wrap;
           border-bottom:1px solid #1b2430; background:#0b0f16; }
  header h1 { font-size:15px; margin:0; font-weight:700; letter-spacing:.2px; white-space:nowrap; }
  .badge { font-size:11px; padding:3px 10px; border-radius:999px; font-weight:600; }
  .badge.ok { background:#0d3a24; color:#3fb950; } .badge.down { background:#3a0d12; color:#f85149; }
  .badge.load { background:#3a2e0d; color:#d29922; }
  .spacer { flex:1; }
  .kv { font-size:11px; color:#8b949e; white-space:nowrap; }
  .kv b { color:#e6edf3; font-variant-numeric:tabular-nums; font-weight:650; }
  .pill { background:#0f1520; border:1px solid #1b2430; border-radius:8px; padding:5px 10px; }
  main { display:grid; grid-template-columns:1fr 340px; height:calc(100vh - 52px); }
  @media (max-width:860px){ main{grid-template-columns:1fr; height:auto;} #panel{border-left:none;border-top:1px solid #1b2430;} }
  #stage { position:relative; display:flex; flex-direction:column; }
  #c { flex:1; width:100%; display:block; }
  #spark { height:76px; width:100%; display:block; border-top:1px solid #131b25; }
  .sparklabel{ position:absolute; left:14px; bottom:60px; font-size:10.5px; color:#6e7681; }
  .legend { position:absolute; left:14px; top:12px; font-size:11px; color:#8b949e; }
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 5px 0 14px;vertical-align:middle;}
  #panel { border-left:1px solid #1b2430; padding:14px; overflow:auto; }
  #panel h2 { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:#8b949e; margin:14px 0 9px; }
  #panel h2:first-child{margin-top:0;}
  button { width:100%; background:#1f6feb; color:#fff; border:0; border-radius:8px; padding:9px;
           font-size:13px; font-weight:650; cursor:pointer; }
  button:disabled{ opacity:.55; cursor:default; }
  .tokbox{ display:flex; gap:10px; margin-top:10px; }
  .tokbox .cell{ flex:1; background:#0f1520; border:1px solid #1b2430; border-radius:9px; padding:9px; text-align:center; }
  .tokbox .big{ font-size:22px; font-weight:750; font-variant-numeric:tabular-nums; }
  .tokbox .lbl{ font-size:10px; color:#8b949e; text-transform:uppercase; letter-spacing:.05em; }
  .snippet{ font-size:11.5px; color:#9aa4af; margin-top:8px; line-height:1.5; border-left:2px solid #1f6feb; padding-left:9px; min-height:1em;}
  .node { background:#0f1520; border:1px solid #1b2430; border-radius:10px; padding:10px 12px; margin-bottom:9px; }
  .node .top { display:flex; align-items:center; gap:8px; }
  .node .name { font-weight:650; font-size:13px; }
  .chip { font-size:9.5px; padding:1px 7px; border-radius:6px; font-weight:700; text-transform:uppercase; }
  .chip.metal { background:#12293f; color:#58a6ff; } .chip.cpu { background:#2a2113; color:#d29922; }
  .chip.coord { background:#241a34; color:#bc8cff; }
  .node .ip { font-size:10.5px; color:#6e7681; margin-left:auto; font-variant-numeric:tabular-nums; }
  .hw{ font-size:10.5px; color:#6e7681; margin-top:5px; }
  .share{ height:6px; background:#161d27; border-radius:4px; margin-top:7px; overflow:hidden; }
  .share > i{ display:block; height:100%; border-radius:4px; }
  .rates { display:flex; gap:14px; margin-top:8px; font-size:12px; font-variant-numeric:tabular-nums; }
  .rates .out b { color:#58a6ff; } .rates .in b { color:#3fb950; } .rates span { color:#8b949e; }
  .tot { font-size:10px; color:#566069; margin-top:5px; font-variant-numeric:tabular-nums; }
  .summary{ font-size:11.5px; color:#8b949e; line-height:1.6; }
  .summary b{ color:#e6edf3; }
</style>
</head>
<body>
<header>
  <h1>Project&nbsp;Amalfi · Live&nbsp;Cell</h1>
  <span id="status" class="badge down">connecting…</span>
  <span class="kv pill">model <b id="hModel">—</b></span>
  <span class="kv pill">size <b id="hSize">—</b></span>
  <span class="kv pill">nodes <b id="hNodes">0</b></span>
  <span class="kv pill">pooled RAM <b id="hRam">—</b></span>
  <div class="spacer"></div>
  <span class="kv pill">↑out <b id="tOut">0</b></span>
  <span class="kv pill">↓in <b id="tIn">0</b></span>
</header>
<main>
  <div id="stage">
    <div class="legend">
      <span class="dot" style="background:#58a6ff"></span>activations → worker
      <span class="dot" style="background:#3fb950"></span>results → coordinator
    </div>
    <canvas id="c"></canvas>
    <div class="sparklabel">total throughput (last ~60 s)</div>
    <canvas id="spark"></canvas>
  </div>
  <div id="panel">
    <h2>Token throughput</h2>
    <button id="run">▶ Run test generation</button>
    <div class="tokbox">
      <div class="cell"><div class="big" id="tps">—</div><div class="lbl">tokens / sec</div></div>
      <div class="cell"><div class="big" id="lat">—</div><div class="lbl">latency&nbsp;s</div></div>
      <div class="cell"><div class="big" id="ntok">—</div><div class="lbl">tokens</div></div>
    </div>
    <div class="snippet" id="snippet"></div>
    <h2>Nodes</h2>
    <div id="nodes"></div>
    <h2>Cell</h2>
    <div class="summary" id="summary">—</div>
  </div>
</main>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const sp=document.getElementById('spark'), sctx=sp.getContext('2d');
let state={healthy:false,running:false,nodes:[],cell:{}}, particles=[], layout=[], DPR=1, hist=[];
const COL={metal:'#58a6ff',cpu:'#d29922',coord:'#bc8cff'};

const human=b=>{ if(b<1)return'0 B/s'; const u=['B/s','KB/s','MB/s','GB/s'];let i=0;while(b>=1024&&i<3){b/=1024;i++;}return b.toFixed(b<10&&i?1:0)+' '+u[i];};
const humanT=b=>{ if(!b)return'0';const u=['B','KB','MB','GB'];let i=0;while(b>=1024&&i<3){b/=1024;i++;}return b.toFixed(1)+' '+u[i];};

function resize(){ DPR=window.devicePixelRatio||1;
  const r=cv.getBoundingClientRect(); cv.width=r.width*DPR; cv.height=r.height*DPR;
  const s=sp.getBoundingClientRect(); sp.width=s.width*DPR; sp.height=s.height*DPR;
  computeLayout(r.width,r.height);
}
function computeLayout(W,H){ layout=[]; const cx=W*.5,cy=H*.5,R=Math.min(W,H)*.33;
  const n=Math.max(state.nodes.length,1);
  state.nodes.forEach((nd,i)=>{ const a=-Math.PI/2+i*(2*Math.PI/n);
    layout.push({nd,x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)}); });
  layout.cx=cx; layout.cy=cy;
}
let acc={};
function spawn(dt){ layout.forEach(l=>{ const {ip,out_bps,in_bps}=l.nd;
  acc[ip]=acc[ip]||{o:0,i:0};
  acc[ip].o+=Math.min(28,out_bps/60000)*dt; acc[ip].i+=Math.min(28,in_bps/60000)*dt;
  while(acc[ip].o>=1){acc[ip].o--; particles.push(mk(layout.cx,layout.cy,l.x,l.y,'#58a6ff'));}
  while(acc[ip].i>=1){acc[ip].i--; particles.push(mk(l.x,l.y,layout.cx,layout.cy,'#3fb950'));}
});}
const mk=(x0,y0,x1,y1,color)=>({x0,y0,x1,y1,t:0,sp:0.55+Math.random()*0.5,color});

let last=performance.now();
function frame(now){ const dt=Math.min(.05,(now-last)/1000); last=now;
  if(state.running) spawn(dt);
  const W=cv.width/DPR,H=cv.height/DPR; ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,W,H);
  layout.forEach(l=>{ ctx.strokeStyle='#161f2b';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(layout.cx,layout.cy);ctx.lineTo(l.x,l.y);ctx.stroke(); });
  particles.forEach(p=>p.t+=p.sp*dt); particles=particles.filter(p=>p.t<1);
  particles.forEach(p=>{ const x=p.x0+(p.x1-p.x0)*p.t,y=p.y0+(p.y1-p.y0)*p.t;
    ctx.fillStyle=p.color;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(x,y,2.6,0,7);ctx.fill(); });
  ctx.globalAlpha=1;
  layout.forEach(l=>drawNode(l.x,l.y,l.nd,false));
  drawNode(layout.cx,layout.cy,{name:'Coordinator',backend:'coord',pct:null},true);
  requestAnimationFrame(frame);
}
function drawNode(x,y,nd,coord){ const r=coord?30:25, c=COL[nd.backend]||'#6e7681';
  if(!coord && nd.pct){ // layer-share ring
    ctx.strokeStyle=c;ctx.globalAlpha=.35;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(x,y,r+6,-Math.PI/2,-Math.PI/2+2*Math.PI*nd.pct/100);ctx.stroke();ctx.globalAlpha=1;
  }
  const act=coord?0:((nd.out_bps||0)+(nd.in_bps||0));
  ctx.shadowBlur=coord?14:6+Math.min(16,act/200000); ctx.shadowColor=c;
  ctx.fillStyle=coord?'#170f28':nd.backend==='metal'?'#0c1c2c':'#211a0e';
  ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='#e6edf3';ctx.textAlign='center';ctx.font='600 12px system-ui';
  ctx.fillText(nd.name,x,y+r+16);
  if(!coord){ ctx.fillStyle='#6e7681';ctx.font='10px system-ui';
    const hw=[nd.pct!=null?nd.pct+'%':null,nd.cores?nd.cores+'c':null,nd.ram_gb?nd.ram_gb+'GB':null].filter(Boolean).join(' · ');
    ctx.fillText(hw,x,y+r+30); }
}
function drawSpark(){ const W=sp.width/DPR,H=sp.height/DPR; sctx.setTransform(DPR,0,0,DPR,0,0); sctx.clearRect(0,0,W,H);
  if(hist.length<2) return; const max=Math.max(...hist,1); const step=W/(60-1);
  sctx.beginPath(); hist.forEach((v,i)=>{ const x=i*step,yv=H-4-(H-10)*v/max; i?sctx.lineTo(x,yv):sctx.moveTo(x,yv); });
  sctx.strokeStyle='#1f6feb';sctx.lineWidth=1.6;sctx.stroke();
  sctx.lineTo((hist.length-1)*step,H);sctx.lineTo(0,H);sctx.closePath();
  sctx.fillStyle='rgba(31,111,235,.14)';sctx.fill();
  sctx.fillStyle='#6e7681';sctx.font='10px system-ui';sctx.textAlign='right';sctx.fillText(human(max),W-4,11);
}

function renderPanel(){ const st=document.getElementById('status');
  st.className='badge '+(state.healthy?'ok':(state.running?'load':'down'));
  st.textContent=state.healthy?'cell healthy':(state.running?'loading…':'offline');
  const c=state.cell||{};
  document.getElementById('hModel').textContent=(c.model||'—')+(c.quant?' '+c.quant:'');
  document.getElementById('hSize').textContent=c.model_size_gb?c.model_size_gb+' GB':'—';
  document.getElementById('hNodes').textContent=c.node_count||0;
  document.getElementById('hRam').textContent=c.pooled_ram_gb?c.pooled_ram_gb+' GB':'—';
  let tin=0,tout=0;
  document.getElementById('nodes').innerHTML=state.nodes.map(n=>{ tin+=n.in_bps;tout+=n.out_bps;
    const col=COL[n.backend]||'#6e7681';
    const hw=[n.cores?n.cores+' cores':null,n.ram_gb?n.ram_gb+' GB':null,n.bw?n.bw+' GB/s':null].filter(Boolean).join(' · ');
    return `<div class="node"><div class="top"><span class="name">${n.name}</span>
      <span class="chip ${n.backend}">${n.backend}</span><span class="ip">${n.ip}</span></div>
      <div class="hw">${hw||'&nbsp;'}</div>
      ${n.pct!=null?`<div class="share"><i style="width:${n.pct}%;background:${col}"></i></div>
        <div class="hw">${n.pct}% of model layers</div>`:''}
      <div class="rates"><span class="out">→ out <b>${human(n.out_bps)}</b></span>
      <span class="in">← in <b>${human(n.in_bps)}</b></span></div>
      <div class="tot">total ${humanT(n.tot_out)} out · ${humanT(n.tot_in)} in</div></div>`;
  }).join('')||'<div class="hw">No worker connections yet.</div>';
  document.getElementById('tOut').textContent=human(tout);
  document.getElementById('tIn').textContent=human(tin);
  hist.push(tin+tout); if(hist.length>60) hist.shift(); drawSpark();
  document.getElementById('summary').innerHTML =
    `Model split across <b>${c.node_count||0}</b> machine(s), coordinator holds the file & orchestrates.
     Pooled RAM <b>${c.pooled_ram_gb||'—'} GB</b> vs model <b>${c.model_size_gb||'—'} GB</b>.
     Context <b>${c.ctx_size||'—'}</b> tokens. The relay is sequential per token — throughput scales by adding cells, capacity by adding nodes.`;
}

document.getElementById('run').onclick=async(e)=>{ const b=e.target; b.disabled=true; b.textContent='⏳ generating…';
  document.getElementById('snippet').textContent='';
  try{ const r=await fetch('/generate'); const d=await r.json();
    if(d.ok){ document.getElementById('tps').textContent=d.tok_s;
      document.getElementById('lat').textContent=d.latency_s; document.getElementById('ntok').textContent=d.tokens;
      document.getElementById('snippet').textContent='“'+d.text.trim()+'”'; }
    else document.getElementById('snippet').textContent='error: '+d.error;
  }catch(err){ document.getElementById('snippet').textContent='request failed'; }
  b.disabled=false; b.textContent='▶ Run test generation';
};

async function poll(){ try{ const r=await fetch('/state'); const s=await r.json();
  const changed=s.nodes.length!==state.nodes.length; state=s;
  if(changed){ const rr=cv.getBoundingClientRect(); computeLayout(rr.width,rr.height); }
  else layout.forEach(l=>{ const m=state.nodes.find(n=>n.ip===l.nd.ip); if(m)l.nd=m; });
  renderPanel();
}catch(e){ const st=document.getElementById('status'); st.className='badge down'; st.textContent='dashboard offline'; } }
window.addEventListener('resize',resize);
resize(); poll(); setInterval(poll,700); requestAnimationFrame(frame);
</script>
</body>
</html>
