<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Amalfi — Live Cell</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0a0e14; color:#e6edf3;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:14px 20px;
           border-bottom:1px solid #1e2733; }
  header h1 { font-size:16px; margin:0; font-weight:650; letter-spacing:.2px; }
  .badge { font-size:12px; padding:3px 10px; border-radius:999px; font-weight:600; }
  .badge.ok { background:#0d3a24; color:#3fb950; }
  .badge.down { background:#3a0d12; color:#f85149; }
  .spacer { flex:1; }
  .stat { font-size:12px; color:#8b949e; }
  .stat b { color:#e6edf3; font-variant-numeric:tabular-nums; }
  main { display:grid; grid-template-columns:1fr 320px; gap:0; height:calc(100vh - 55px); }
  @media (max-width:820px){ main{grid-template-columns:1fr; height:auto;} #panel{border-left:none;border-top:1px solid #1e2733;} }
  #stage { position:relative; }
  canvas { width:100%; height:100%; display:block; }
  #panel { border-left:1px solid #1e2733; padding:14px; overflow:auto; }
  #panel h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#8b949e; margin:0 0 10px; }
  .node { background:#0f1520; border:1px solid #1e2733; border-radius:10px; padding:10px 12px; margin-bottom:10px; }
  .node .top { display:flex; align-items:center; gap:8px; }
  .node .name { font-weight:650; font-size:13px; }
  .chip { font-size:10px; padding:1px 7px; border-radius:6px; font-weight:700; text-transform:uppercase; }
  .chip.metal { background:#12293f; color:#58a6ff; }
  .chip.cpu { background:#2a2113; color:#d29922; }
  .chip.coord { background:#241a34; color:#bc8cff; }
  .node .ip { font-size:11px; color:#6e7681; margin-left:auto; font-variant-numeric:tabular-nums; }
  .rates { display:flex; gap:14px; margin-top:8px; font-size:12px; font-variant-numeric:tabular-nums; }
  .rates .out b { color:#58a6ff; } .rates .in b { color:#3fb950; }
  .rates span { color:#8b949e; }
  .tot { font-size:10.5px; color:#5a636d; margin-top:5px; font-variant-numeric:tabular-nums; }
  .legend { position:absolute; left:14px; bottom:12px; font-size:11px; color:#8b949e; }
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 5px 0 12px;vertical-align:middle;}
  .hint{ font-size:11px;color:#6e7681;margin-top:6px;line-height:1.5;}
</style>
</head>
<body>
<header>
  <h1>Project Amalfi · Live Cell</h1>
  <span id="status" class="badge down">connecting…</span>
  <div class="spacer"></div>
  <div class="stat">out&nbsp;<b id="tOut">0</b></div>
  <div class="stat">in&nbsp;<b id="tIn">0</b></div>
  <div class="stat">nodes&nbsp;<b id="tN">0</b></div>
</header>
<main>
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="legend">
      <span class="dot" style="background:#58a6ff"></span>activations → worker
      <span class="dot" style="background:#3fb950"></span>results → coordinator
    </div>
  </div>
  <div id="panel">
    <h2>Nodes</h2>
    <div id="nodes"></div>
    <div class="hint">Each dot is real network traffic sampled from the coordinator.
      Flow to a worker = activations for its layers; flow back = its computed results.
      More traffic ⇒ denser, faster particles.</div>
  </div>
</main>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let state = {healthy:false, running:false, nodes:[]}, particles = [], layout = [], DPR = 1;

function human(bps){ // bytes/sec -> readable
  if (bps < 1) return '0 B/s';
  const u=['B/s','KB/s','MB/s','GB/s']; let i=0; while(bps>=1024&&i<u.length-1){bps/=1024;i++;}
  return bps.toFixed(bps<10&&i>0?1:0)+' '+u[i];
}
function humanTot(b){ if(!b) return '0'; const u=['B','KB','MB','GB']; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return b.toFixed(1)+' '+u[i]; }

function resize(){
  DPR = window.devicePixelRatio||1;
  const r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width*DPR; cv.height = r.height*DPR;
  computeLayout(r.width, r.height);
}
function computeLayout(W,H){
  layout = [];
  const cx=W*0.5, cy=H*0.5, R=Math.min(W,H)*0.34;
  const workers = state.nodes;
  const n = Math.max(workers.length,1);
  workers.forEach((nd,i)=>{
    const ang = -Math.PI/2 + i*(2*Math.PI/n) + (n===1?0:0);
    layout.push({ nd, x: cx + R*Math.cos(ang), y: cy + R*Math.sin(ang) });
  });
  layout.cx=cx; layout.cy=cy;
}
function edgeFor(ip){ return layout.find(l=>l.nd.ip===ip); }

// spawn particles based on live byte rates
let spawnAcc = {};
function spawn(dt){
  layout.forEach(l=>{
    const {ip,out_bps,in_bps} = l.nd;
    const kOut = Math.min(30, out_bps/60000);   // scale bytes/s -> particles/s
    const kIn  = Math.min(30, in_bps/60000);
    spawnAcc[ip] = spawnAcc[ip]||{o:0,i:0};
    spawnAcc[ip].o += kOut*dt; spawnAcc[ip].i += kIn*dt;
    while(spawnAcc[ip].o>=1){ spawnAcc[ip].o--; particles.push(mkP(layout.cx,layout.cy,l.x,l.y,'#58a6ff')); }
    while(spawnAcc[ip].i>=1){ spawnAcc[ip].i--; particles.push(mkP(l.x,l.y,layout.cx,layout.cy,'#3fb950')); }
  });
}
function mkP(x0,y0,x1,y1,color){ return {x0,y0,x1,y1,t:0,sp:0.6+Math.random()*0.5,color}; }

let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(state.running) spawn(dt);
  const W=cv.width/DPR, H=cv.height/DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  // edges
  layout.forEach(l=>{
    ctx.strokeStyle='#1b2431'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(layout.cx,layout.cy); ctx.lineTo(l.x,l.y); ctx.stroke();
  });
  // particles
  particles.forEach(p=>{ p.t+=p.sp*dt; });
  particles = particles.filter(p=>p.t<1);
  particles.forEach(p=>{
    const x=p.x0+(p.x1-p.x0)*p.t, y=p.y0+(p.y1-p.y0)*p.t;
    ctx.fillStyle=p.color; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.arc(x,y,2.6,0,7); ctx.fill();
  });
  ctx.globalAlpha=1;
  // worker nodes
  layout.forEach(l=>{
    drawNode(l.x,l.y, l.nd.name, l.nd.backend, false, (l.nd.out_bps+l.nd.in_bps));
  });
  // coordinator
  drawNode(layout.cx,layout.cy,'Coordinator','coord',true,0);
  requestAnimationFrame(frame);
}
function drawNode(x,y,name,kind,coord,activity){
  const r = coord?30:24;
  const glow = Math.min(18, activity/200000);
  ctx.shadowBlur = coord?14:(6+glow);
  ctx.shadowColor = kind==='metal'?'#58a6ff':kind==='cpu'?'#d29922':'#bc8cff';
  ctx.fillStyle = coord?'#1a1330':kind==='metal'?'#0d1f30':'#241d10';
  ctx.strokeStyle = kind==='metal'?'#58a6ff':kind==='cpu'?'#d29922':'#bc8cff';
  ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#e6edf3'; ctx.font='600 12px -apple-system,system-ui'; ctx.textAlign='center';
  ctx.fillText(name, x, y+r+16);
}

function renderPanel(){
  document.getElementById('status').className='badge '+(state.healthy?'ok':'down');
  document.getElementById('status').textContent = state.healthy?'cell healthy':(state.running?'loading…':'offline');
  let tin=0,tout=0;
  const html = state.nodes.map(n=>{ tin+=n.in_bps; tout+=n.out_bps;
    const chip = n.backend==='metal'?'metal':n.backend==='cpu'?'cpu':'';
    return `<div class="node"><div class="top"><span class="name">${n.name}</span>
      <span class="chip ${chip}">${n.backend}</span><span class="ip">${n.ip}</span></div>
      <div class="rates"><span class="out">→ out <b>${human(n.out_bps)}</b></span>
      <span class="in">← in <b>${human(n.in_bps)}</b></span></div>
      <div class="tot">total: ${humanTot(n.tot_out)} out · ${humanTot(n.tot_in)} in</div></div>`;
  }).join('');
  document.getElementById('nodes').innerHTML = html || '<div class="hint">No worker connections yet.</div>';
  document.getElementById('tOut').textContent=human(tout);
  document.getElementById('tIn').textContent=human(tin);
  document.getElementById('tN').textContent=state.nodes.length;
}

async function poll(){
  try{
    const r = await fetch('/state'); const s = await r.json();
    const nChanged = s.nodes.length!==state.nodes.length;
    state = s;
    if(nChanged){ const rr=cv.parentElement.getBoundingClientRect(); computeLayout(rr.width,rr.height); }
    else { layout.forEach(l=>{ const m=state.nodes.find(n=>n.ip===l.nd.ip); if(m) l.nd=m; }); }
    renderPanel();
  }catch(e){ document.getElementById('status').className='badge down';
             document.getElementById('status').textContent='dashboard offline'; }
}
window.addEventListener('resize', resize);
resize(); poll(); setInterval(poll, 700); requestAnimationFrame(frame);
</script>
</body>
</html>
